[package]
authors = ["Takahiro Sato <harehare1110@gmail.com>"]
categories = ["command-line-utilities", "text-processing"]
description = "Web API bindings for mq"
edition = "2024"
homepage = "https://mqlang.org/"
keywords = ["markdown", "jq", "query"]
license = "MIT"
name = "mq-web-api"
publish = false
readme = "README.md"
repository = "https://github.com/harehare/mq"
version = "0.5.26"

[features]
default = ["use_mimalloc"]
use_mimalloc = ["mimalloc"]

[dependencies]
async-trait = {workspace = true}
axum = {workspace = true}
miette = {workspace = true}
mimalloc = {workspace = true, features = ["v3"], optional = true}
mq-check = {workspace = true}
mq-formatter = {workspace = true}
mq-hir = {workspace = true}
mq-lang = {workspace = true, features = ["cst"]}
mq-markdown = {workspace = true, features = ["json"]}
serde = {workspace = true, features = ["derive"]}
serde_json = {workspace = true}
thiserror = {workspace = true}
tokio = {workspace = true, features = ["full"]}
tower = {workspace = true}
tower-http = {workspace = true, features = ["cors", "trace", "compression-gzip"]}
tracing = {workspace = true}
tracing-subscriber = {workspace = true, features = ["env-filter", "json"]}
utoipa = {workspace = true, features = ["preserve_order"]}
utoipa-swagger-ui = {workspace = true}

[[bin]]
name = "mq-web-api"
path = "src/main.rs"
