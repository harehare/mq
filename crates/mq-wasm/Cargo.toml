[package]
authors = ["Takahiro Sato <harehare1110@gmail.com>"]
categories = ["command-line-utilities", "text-processing"]
description = "WebAssembly bindings for mq Markdown processing"
edition = "2024"
homepage = "https://mqlang.org/"
keywords = ["markdown", "jq", "query"]
license = "MIT"
name = "mq-wasm"
publish = false
readme = "README.md"
repository = "https://github.com/harehare/mq"
version = "0.6.3"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
itertools = {workspace = true}
js-sys = {workspace = true}
md5 = {workspace = true}
mq-formatter = {workspace = true}
mq-hir = {workspace = true}
mq-check = {workspace = true}
mq-lang = {workspace = true, features = ["ast-json", "http-import"]}
sha2 = {workspace = true}
mq-markdown = {workspace = true}
opfs = {workspace = true, optional = true}
serde = {workspace = true, features = ["derive"]}
serde-wasm-bindgen = {workspace = true}
serde_json = {workspace = true}
wasm-bindgen = {workspace = true}
wasm-bindgen-futures = {workspace = true}
web-sys = {version = "0.3", features = ["Response"]}

[dev-dependencies]
wasm-bindgen-test = {workspace = true}

[features]
default = ["opfs"]
opfs = ["dep:opfs"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ['-O4', '--enable-simd', '--enable-bulk-memory', '--enable-nontrapping-float-to-int']

[package.metadata.cargo-machete]
ignored = ["wasm-bindgen-futures"]
