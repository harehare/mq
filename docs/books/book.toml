[book]
authors = ["Takahiro Sato"]
description = "mq documentation: a jq-like command-line tool for processing Markdown files written in Rust. Learn how to slice, filter, map, and transform Markdown with ease."
language = "en"
src = "src"
title = "mq - jq like tool for markdown processing"

[output.html]
additional-css = ["theme/custom.css"]
additional-js = ["theme/highlight-mq.js", "theme/playground-link.js"]
default-theme = "navy"
git-repository-url = "https://github.com/harehare/mq"
no-section-label = true
preferred-dark-theme = "navy"
site-url = "/book"
smart-punctuation = true
