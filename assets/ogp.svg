<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#2d3f54"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#85d4ff"/>
      <stop offset="100%" stop-color="#67b8e3"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2B5773"/>
      <stop offset="100%" stop-color="#61AFEF"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="20%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#67b8e3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#67b8e3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#67b8e3" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#67b8e3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowLeft)"/>
  <rect width="1200" height="630" fill="url(#glowRight)"/>

  <!-- ==================== -->
  <!-- LEFT SECTION CONTENT -->
  <!-- ==================== -->

  <!-- Logo: translate(24,95) scale(1.8) → M center y=185, aligns with "mq" text center -->
  <g transform="translate(24, 95) scale(1.8)">
    <g transform="matrix(-1 0 0 -1 100 100)">
      <line x1="20" y1="50" x2="80" y2="50" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round"/>
      <path d="M30 35 L30 65 L40 65 L50 45 L60 65 L70 65 L70 35" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- "mq" brand — starts at x=182 (14px after logo right edge at 168) -->
  <text x="182" y="208"
    font-family="'Space Grotesk', 'Arial Black', Arial, sans-serif"
    font-size="90"
    font-weight="700"
    letter-spacing="-3"
    fill="url(#primaryGrad)">mq</text>

  <!-- Tagline -->
  <text x="60" y="278"
    font-family="'Space Grotesk', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#e2e8f0">Query. Filter.</text>
  <text x="60" y="322"
    font-family="'Space Grotesk', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#e2e8f0">Transform <tspan fill="url(#primaryGrad)">Markdown.</tspan></text>

  <!-- Description -->
  <text x="60" y="374"
    font-family="Inter, Arial, sans-serif"
    font-size="17"
    fill="#94a3b8">A jq-like command-line tool for Markdown processing,</text>
  <text x="60" y="398"
    font-family="Inter, Arial, sans-serif"
    font-size="17"
    fill="#94a3b8">written in Rust — slice, filter, map, and transform.</text>

  <!-- Install command card -->
  <rect x="60" y="430" width="396" height="46" rx="6" fill="#1e293b" stroke="#3d4a5c" stroke-width="1"/>
  <text x="82" y="459"
    font-family="'Courier New', monospace"
    font-size="14"
    fill="#67b8e3" opacity="0.65">$</text>
  <text x="100" y="459"
    font-family="'Courier New', monospace"
    font-size="14"
    fill="#e2e8f0">cargo install mq-run</text>

  <!-- ======================= -->
  <!-- RIGHT SECTION: Terminal -->
  <!-- ======================= -->

  <!-- Terminal window -->
  <rect x="664" y="65" width="490" height="500" rx="12"
    fill="#1e293b" stroke="#3d4a5c" stroke-width="1" stroke-opacity="0.8"/>

  <!-- Title bar background -->
  <rect x="664" y="65" width="490" height="44" rx="12" fill="#232e3d"/>
  <rect x="664" y="89" width="490" height="20" fill="#232e3d"/>

  <!-- Traffic light dots -->
  <circle cx="694" cy="87" r="6" fill="#ef444450"/>
  <circle cx="718" cy="87" r="6" fill="#94a3b850"/>
  <circle cx="742" cy="87" r="6" fill="#67b8e350"/>

  <!-- ── Example 1 ── -->
  <text x="688" y="140"
    font-family="'Courier New', monospace" font-size="14"
    fill="#67b8e3" opacity="0.65">$</text>
  <text x="704" y="140"
    font-family="'Courier New', monospace" font-size="14" fill="#e2e8f0">cat README.md | mq <tspan fill="#85d4ff">'.h1 | to_text()'</tspan></text>

  <text x="688" y="174"
    font-family="'Courier New', monospace" font-size="13" fill="#475569"># Output:</text>

  <text x="688" y="198" font-family="'Courier New', monospace" font-size="14" fill="#85d4ff">Slice and Filter</text>
  <text x="688" y="222" font-family="'Courier New', monospace" font-size="14" fill="#85d4ff">Map and Transform</text>
  <text x="688" y="246" font-family="'Courier New', monospace" font-size="14" fill="#85d4ff">Command-line Interface</text>

  <!-- Separator 1 -->
  <line x1="688" y1="274" x2="1132" y2="274" stroke="#3d4a5c" stroke-width="1"/>

  <!-- ── Example 2 ── -->
  <text x="688" y="308"
    font-family="'Courier New', monospace" font-size="14"
    fill="#67b8e3" opacity="0.65">$</text>
  <text x="704" y="308"
    font-family="'Courier New', monospace" font-size="14" fill="#e2e8f0">mq <tspan fill="#85d4ff">'.list | map(upcase)'</tspan> doc.md</text>

  <text x="688" y="342"
    font-family="'Courier New', monospace" font-size="13" fill="#475569"># Output:</text>

  <text x="688" y="366" font-family="'Courier New', monospace" font-size="14" fill="#85d4ff">- ITEM ONE</text>
  <text x="688" y="390" font-family="'Courier New', monospace" font-size="14" fill="#85d4ff">- ITEM TWO</text>
  <text x="688" y="414" font-family="'Courier New', monospace" font-size="14" fill="#85d4ff">- ITEM THREE</text>

  <!-- Separator 2 -->
  <line x1="688" y1="442" x2="1132" y2="442" stroke="#3d4a5c" stroke-width="1"/>

  <!-- ── Example 3 ── -->
  <text x="688" y="476"
    font-family="'Courier New', monospace" font-size="14"
    fill="#67b8e3" opacity="0.65">$</text>
  <text x="704" y="476"
    font-family="'Courier New', monospace" font-size="14" fill="#e2e8f0">mq <tspan fill="#85d4ff">'.code | to_text()'</tspan> README.md</text>

  <text x="688" y="510"
    font-family="'Courier New', monospace" font-size="13" fill="#475569"># Output:</text>

  <text x="688" y="534" font-family="'Courier New', monospace" font-size="14" fill="#85d4ff">cargo install mq-run</text>

  <!-- Blinking cursor -->
  <rect x="688" y="548" width="9" height="16" fill="#85d4ff" opacity="0.85"/>
</svg>
