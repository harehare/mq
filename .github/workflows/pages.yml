name: Deploy docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "packages/mq-playground/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: packages/mq-playground/package.json
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack,mdbook
      - uses: extractions/setup-just@v3
      - name: Build
        run: just build-wasm
      - name: Build mdbook
        run: mdbook build -d ../book
        working-directory: ./docs/books
      - name: Install playground dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./packages/mq-playground
      - name: Build playground
        run: pnpm run build
        working-directory: ./packages/mq-playground
      - name: Copy install script
        run: |
          cp ./scripts/install.sh ./docs
          cp ./scripts/install_lsp.sh ./docs
          cp ./scripts/install_crawler.sh ./docs
      - name: Replace env vars
        env:
          API_URL: ${{ secrets.API_URL }}
        run: ./scripts/replace-env.sh
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
